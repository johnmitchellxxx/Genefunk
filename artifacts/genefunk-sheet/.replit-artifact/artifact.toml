kind = "web"
previewPath = "/"
title = "GeneFunk Character Sheet"
version = "1.0.0"
id = "artifacts/genefunk-sheet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19136
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/genefunk-sheet run dev"

[services.env]
PORT = "19136"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/genefunk-sheet", "run", "build"]
publicDir = "artifacts/genefunk-sheet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
